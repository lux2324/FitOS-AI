<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitOS — Intake Step 2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="fullscreen" style="flex-direction:column; gap:0;">

  <div style="position:fixed; top:0; left:0; right:0; padding:20px 40px; display:flex; justify-content:space-between; align-items:center; z-index:10;">
    <div style="font-family:var(--font-head); font-size:22px; font-weight:900; font-style:italic; color:var(--cyan);">FitOS</div>
    <div style="font-size:12px; color:var(--text-muted);">Step <span style="color:var(--cyan);">2</span> of 4</div>
  </div>

  <div class="intake-container">

    <!-- Steps -->
    <div class="steps">
      <div class="step done">
        <div class="step-circle">
          <span class="material-symbols-outlined" style="font-size:18px;">check</span>
        </div>
        <span class="step-label">Basic</span>
      </div>
      <div class="step-line done"></div>
      <div class="step active">
        <div class="step-circle">2</div>
        <span class="step-label">Experience</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-circle">3</div>
        <span class="step-label">Recovery</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-circle">4</div>
        <span class="step-label">Safety</span>
      </div>
    </div>

    <!-- Card: Step 2 -->
    <div class="intake-card">
      <h2>Training Experience</h2>
      <p class="subtitle">Help us understand your background.</p>

      <div class="form-group">
        <label class="form-label">Experience Level</label>
        <div class="option-cards" style="grid-template-columns:repeat(4,1fr);">
          <label class="option-card" onclick="selectCard(this)">
            <input type="radio" name="exp" value="complete_novice">
            <span class="material-symbols-outlined" style="display:block;font-size:24px;margin-bottom:4px;">kid_star</span>
            Complete Novice
          </label>
          <label class="option-card selected" onclick="selectCard(this)">
            <input type="radio" name="exp" value="novice" checked>
            <span class="material-symbols-outlined" style="display:block;font-size:24px;margin-bottom:4px;">star_half</span>
            Novice
          </label>
          <label class="option-card" onclick="selectCard(this)">
            <input type="radio" name="exp" value="intermediate">
            <span class="material-symbols-outlined" style="display:block;font-size:24px;margin-bottom:4px;">star</span>
            Intermediate
          </label>
          <label class="option-card" onclick="selectCard(this)">
            <input type="radio" name="exp" value="advanced">
            <span class="material-symbols-outlined" style="display:block;font-size:24px;margin-bottom:4px;">military_tech</span>
            Advanced
          </label>
        </div>
      </div>

      <div class="grid-2" style="margin-bottom:0;">
        <div class="form-group">
          <label class="form-label">Years of Training</label>
          <select class="form-input">
            <option value="0">None</option>
            <option value="0_to_1">Less than 1 year</option>
            <option value="1_to_2" selected>1 - 2 years</option>
            <option value="2_to_5">2 - 5 years</option>
            <option value="5_plus">5+ years</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Currently Training?</label>
          <select class="form-input">
            <option value="no">No</option>
            <option value="yes_irregularly">Yes, irregularly</option>
            <option value="yes_regularly" selected>Yes, regularly</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Previous Sports</label>
        <div class="option-cards" style="grid-template-columns:repeat(4,1fr);">
          <label class="option-card" onclick="this.classList.toggle('selected')">
            <input type="checkbox" name="sports" value="football"> Football
          </label>
          <label class="option-card selected" onclick="this.classList.toggle('selected')">
            <input type="checkbox" name="sports" value="basketball" checked> Basketball
          </label>
          <label class="option-card" onclick="this.classList.toggle('selected')">
            <input type="checkbox" name="sports" value="martial_arts"> Martial Arts
          </label>
          <label class="option-card" onclick="this.classList.toggle('selected')">
            <input type="checkbox" name="sports" value="swimming"> Swimming
          </label>
        </div>
      </div>

      <div class="separator"></div>

      <label class="form-label" style="margin-bottom:16px;">Current Strength (to failure)</label>
      <div class="grid-3" style="margin-bottom:0;">
        <div class="form-group">
          <label class="form-label" style="font-size:10px;">Push-ups</label>
          <input type="number" class="form-input" placeholder="15">
        </div>
        <div class="form-group">
          <label class="form-label" style="font-size:10px;">Pull-ups</label>
          <input type="number" class="form-input" placeholder="5">
        </div>
        <div class="form-group">
          <label class="form-label" style="font-size:10px;">BW Squats</label>
          <input type="number" class="form-input" placeholder="30">
        </div>
      </div>

      <div class="intake-footer">
        <a href="03_intake.html" class="btn btn-ghost">
          <span class="material-symbols-outlined">arrow_back</span>
          Back
        </a>
        <button class="btn btn-primary">
          Next
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
function selectCard(el) {
  const group = el.closest('.option-cards');
  const isRadio = el.querySelector('input[type="radio"]');
  if (isRadio) {
    group.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  }
}
</script>

</body>
</html>
