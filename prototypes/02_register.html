<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitOS — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="fullscreen">
  <div class="auth-container">

    <div class="auth-card">
      <div class="auth-logo">
        <h1>FitOS</h1>
        <p>Create Your Account</p>
      </div>

      <form>
        <div class="grid-2" style="margin-bottom:0;">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-input" placeholder="John">
          </div>
          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-input" placeholder="Smith">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="Min. 8 characters">
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" placeholder="Repeat password">
        </div>

        <div style="margin-bottom:24px;">
          <label style="display:flex; align-items:flex-start; gap:8px; font-size:13px; color:var(--text-dim); cursor:pointer;">
            <input type="checkbox" style="accent-color:var(--cyan); margin-top:3px;">
            I accept the Terms of Service and Privacy Policy
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <span class="material-symbols-outlined">person_add</span>
          Create Account
        </button>
      </form>

      <div class="auth-divider">already have an account?</div>

      <a href="01_login.html" class="btn btn-outline btn-block">
        <span class="material-symbols-outlined">login</span>
        Sign In
      </a>
    </div>

  </div>
</div>

</body>
</html>
