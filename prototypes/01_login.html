<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitOS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="fullscreen">
  <div class="auth-container">

    <div class="auth-card">
      <div class="auth-logo">
        <h1>FitOS</h1>
        <p>AI Coach System</p>
      </div>

      <form>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="you@example.com">
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="Min. 8 characters">
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
          <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text-dim); cursor:pointer;">
            <input type="checkbox" style="accent-color:var(--cyan);">
            Remember me
          </label>
          <a href="#" style="font-size:13px;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <span class="material-symbols-outlined">login</span>
          Sign In
        </button>
      </form>

      <div class="auth-divider">or</div>

      <a href="02_register.html" class="btn btn-outline btn-block">
        <span class="material-symbols-outlined">person_add</span>
        Create Account
      </a>
    </div>

    <p style="text-align:center; margin-top:24px; font-size:12px; color:var(--text-muted);">
      FitOS v1.0 &mdash; AI-Powered Training Coach
    </p>

  </div>
</div>

</body>
</html>
