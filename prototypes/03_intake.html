<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitOS — Intake</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="fullscreen" style="flex-direction:column; gap:0;">

  <!-- Top bar -->
  <div style="position:fixed; top:0; left:0; right:0; padding:20px 40px; display:flex; justify-content:space-between; align-items:center; z-index:10;">
    <div style="font-family:var(--font-head); font-size:22px; font-weight:900; font-style:italic; color:var(--cyan);">FitOS</div>
    <div style="font-size:12px; color:var(--text-muted);">Step <span style="color:var(--cyan);">1</span> of 4</div>
  </div>

  <div class="intake-container">

    <!-- Steps -->
    <div class="steps">
      <div class="step active">
        <div class="step-circle">1</div>
        <span class="step-label">Basic</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-circle">2</div>
        <span class="step-label">Experience</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-circle">3</div>
        <span class="step-label">Recovery</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-circle">4</div>
        <span class="step-label">Safety</span>
      </div>
    </div>

    <!-- Card: Step 1 -->
    <div class="intake-card" id="step-1">
      <h2>Basic Info & Goal</h2>
      <p class="subtitle">Tell us about yourself so we can build your plan.</p>

      <div class="grid-2" style="margin-bottom:0;">
        <div class="form-group">
          <label class="form-label">Age</label>
          <input type="number" class="form-input" placeholder="25">
        </div>
        <div class="form-group">
          <label class="form-label">Sex</label>
          <div class="option-cards" style="grid-template-columns:1fr 1fr;">
            <label class="option-card selected" onclick="selectCard(this)">
              <input type="radio" name="sex" value="male" checked> Male
            </label>
            <label class="option-card" onclick="selectCard(this)">
              <input type="radio" name="sex" value="female"> Female
            </label>
          </div>
        </div>
      </div>

      <div class="grid-2" style="margin-bottom:0;">
        <div class="form-group">
          <label class="form-label">Height (cm)</label>
          <input type="number" class="form-input" placeholder="180">
        </div>
        <div class="form-group">
          <label class="form-label">Weight (kg)</label>
          <input type="number" class="form-input" placeholder="80">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Primary Goal</label>
        <div class="option-cards" style="grid-template-columns:repeat(4,1fr);">
          <label class="option-card" onclick="selectCard(this)">
            <input type="radio" name="goal" value="general_fitness">
            <span class="material-symbols-outlined" style="display:block;font-size:24px;margin-bottom:4px;">fitness_center</span>
            General Fitness
          </label>
          <label class="option-card selected" onclick="selectCard(this)">
            <input type="radio" name="goal" value="muscle_gain" checked>
            <span class="material-symbols-outlined" style="display:block;font-size:24px;margin-bottom:4px;">exercise</span>
            Muscle Gain
          </label>
          <label class="option-card" onclick="selectCard(this)">
            <input type="radio" name="goal" value="fat_loss">
            <span class="material-symbols-outlined" style="display:block;font-size:24px;margin-bottom:4px;">local_fire_department</span>
            Fat Loss
          </label>
          <label class="option-card" onclick="selectCard(this)">
            <input type="radio" name="goal" value="recomposition">
            <span class="material-symbols-outlined" style="display:block;font-size:24px;margin-bottom:4px;">sync_alt</span>
            Recomp
          </label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Body Part Priority</label>
        <select class="form-input">
          <option value="">Select priority...</option>
          <option value="upper_priority">Upper Body Priority</option>
          <option value="lower_priority">Lower Body Priority</option>
          <option value="balanced">Balanced</option>
          <option value="chest_back_legs">Chest + Back + Legs</option>
          <option value="legs_glutes_focus">Legs & Glutes Focus</option>
        </select>
      </div>

      <div class="intake-footer">
        <div></div>
        <button class="btn btn-primary">
          Next
          <span class="material-symbols-outlined">arrow_forward</span>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
function selectCard(el) {
  const group = el.closest('.option-cards');
  group.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}
</script>

</body>
</html>
