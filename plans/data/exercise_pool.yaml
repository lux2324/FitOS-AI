# ============================================================
# SESSION TEMPLATES - izvuceno iz tvojih stvarnih obrazaca
# ============================================================
#
# Ovo su standardni obrasci koji se ponavljaju kroz 35 tjedana.
# Agent ih koristi kao template, pa popunjava iz exercise poola.
#
# PRAVILO: sesija pocinje s 1-2 main compounda,
#          zatim 1 support/secondary,
#          zavrsava s 2-3 izolacija.

session_templates:

  push:
    description: "Prsa + triceps + rame"
    slots:
      - {slot: 1, category: horizontal_push, role: main_compound, note: "glavni press"}
      - {slot: 2, category: horizontal_push, role: main_compound, note: "drugi press ili kosi"}
      - {slot: 3, category: chest_isolation, role: isolation}
      - {slot: 4, category: triceps_isolation, role: isolation}
      - {slot: 5, category: shoulder_isolation, role: isolation}
      - {slot: 6, category: triceps_isolation, role: isolation, optional: true}

  pull:
    description: "Leda + biceps"
    slots:
      - {slot: 1, category: horizontal_pull, role: main_compound, note: "row pattern"}
      - {slot: 2, category: vertical_pull, role: main_compound, note: "pulldown/pullup"}
      - {slot: 3, category: horizontal_pull, role: secondary_compound, note: "drugi row"}
      - {slot: 4, category: biceps_isolation, role: isolation}
      - {slot: 5, category: biceps_isolation, role: isolation}

  legs:
    description: "Noge kompletno"
    slots:
      - {slot: 1, category: hip_hinge, role: main_compound, note: "RDL ili deadlift varijanta"}
      - {slot: 2, category: squat_knee_dominant, role: main_compound, note: "leg press ili hack squat"}
      - {slot: 3, category: quad_isolation, role: isolation}
      - {slot: 4, category: hamstring_isolation, role: isolation}
      - {slot: 5, category: calf, role: isolation}
      - {slot: 6, category: abs, role: isolation}

  upper:
    description: "Gornji dio - push + pull + ruke"
    slots:
      - {slot: 1, category: horizontal_push, role: main_compound}
      - {slot: 2, category: vertical_pull, role: main_compound}
      - {slot: 3, category: horizontal_pull, role: secondary_compound}
      - {slot: 4, category: chest_isolation, role: isolation, note: "ili shoulder_isolation"}
      - {slot: 5, category: biceps_isolation, role: isolation}
      - {slot: 6, category: triceps_isolation, role: isolation}

  upper_1:
    description: "Upper 1 - tezi push fokus"
    slots:
      - {slot: 1, category: horizontal_push, role: main_compound, note: "bench press"}
      - {slot: 2, category: vertical_pull, role: main_compound, note: "lat pulldown"}
      - {slot: 3, category: chest_isolation, role: isolation}
      - {slot: 4, category: horizontal_pull, role: secondary_compound}
      - {slot: 5, category: triceps_isolation, role: isolation}
      - {slot: 6, category: biceps_isolation, role: isolation}

  upper_2:
    description: "Upper 2 - drugaciji odabir, vise pull"
    slots:
      - {slot: 1, category: horizontal_push, role: main_compound, note: "kosi potisak ili propadanja"}
      - {slot: 2, category: horizontal_pull, role: main_compound, note: "row varijanta"}
      - {slot: 3, category: horizontal_push, role: main_compound, note: "propadanja ili drugi press"}
      - {slot: 4, category: vertical_pull, role: main_compound, note: "uski hvat"}
      - {slot: 5, category: chest_isolation, role: isolation}
      - {slot: 6, category: biceps_isolation, role: isolation}
      - {slot: 7, category: triceps_isolation, role: isolation}

  lower_1:
    description: "Lower 1 - tezi compounds"
    slots:
      - {slot: 1, category: squat_knee_dominant, role: main_compound, note: "hack squat"}
      - {slot: 2, category: hip_hinge, role: main_compound, note: "RDL"}
      - {slot: 3, category: quad_isolation, role: isolation}
      - {slot: 4, category: hamstring_isolation, role: isolation}
      - {slot: 5, category: calf, role: isolation}

  lower_2:
    description: "Lower 2 - unilateral + dopuna"
    slots:
      - {slot: 1, category: single_leg, role: main_compound, note: "bugarski cucanj"}
      - {slot: 2, category: hip_hinge, role: main_compound, note: "stiff leg ili RDL"}
      - {slot: 3, category: quad_isolation, role: isolation}
      - {slot: 4, category: hamstring_isolation, role: isolation}
      - {slot: 5, category: calf, role: isolation}
      - {slot: 6, category: abs, role: isolation}

  full_body:
    description: "Cijelo tijelo - minimalna pokrivenost"
    slots:
      - {slot: 1, category: horizontal_push, role: main_compound}
      - {slot: 2, category: vertical_pull, role: main_compound}
      - {slot: 3, category: squat_knee_dominant, role: main_compound}
      - {slot: 4, category: hamstring_isolation, role: isolation}
      - {slot: 5, category: biceps_isolation, role: isolation}
      - {slot: 6, category: triceps_isolation, role: isolation}

  # ----------------------------------------------------------
  # FEMALE-SPECIFIC TEMPLATES
  # ----------------------------------------------------------

  lower_f1:
    description: "Ženski Lower 1 - squat + RDL + hip thrust"
    slots:
      - {slot: 1, category: squat_knee_dominant, role: main_compound, note: "hack squat ili leg press"}
      - {slot: 2, category: hip_hinge, role: main_compound, note: "RDL"}
      - {slot: 3, category: glute_compound, role: main_compound, note: "hip thrust"}
      - {slot: 4, category: quad_isolation, role: isolation}
      - {slot: 5, category: hamstring_isolation, role: isolation}
      - {slot: 6, category: glute_isolation, role: isolation, optional: true}

  lower_f2:
    description: "Ženski Lower 2 - unilateral + gluteus fokus"
    slots:
      - {slot: 1, category: single_leg, role: main_compound, note: "bugarski cucanj ili step-ups"}
      - {slot: 2, category: hip_hinge, role: main_compound, note: "stiff leg ili RDL varijanta"}
      - {slot: 3, category: glute_compound, role: main_compound, note: "hip thrust"}
      - {slot: 4, category: glute_isolation, role: isolation}
      - {slot: 5, category: hamstring_isolation, role: isolation}
      - {slot: 6, category: adductor_isolation, role: isolation, optional: true}

  full_body_f:
    description: "Ženski Full Body - noge/glute compounds + leda + ruke"
    slots:
      - {slot: 1, category: glute_compound, role: main_compound, note: "hip thrust"}
      - {slot: 2, category: single_leg, role: main_compound, note: "step-ups ili bugarski"}
      - {slot: 3, category: vertical_pull, role: main_compound, note: "lat pulldown"}
      - {slot: 4, category: horizontal_pull, role: secondary_compound, note: "veslanje na sajli"}
      - {slot: 5, category: biceps_isolation, role: isolation}
      - {slot: 6, category: triceps_isolation, role: isolation, optional: true}
      - {slot: 7, category: glute_isolation, role: isolation, optional: true}


# ============================================================
# SPLIT CONFIGURATIONS - koji templatei idu zajedno
# ============================================================

split_configs:

  push_pull_legs:
    sessions_per_week: 4
    rotation: [push, pull, legs, upper]
    phases_used: [1]
    notes: "Faza 1, tjedni 1-11. Push i Pull su odvojeni, Upper spaja oba."

  full_body_upper_legs:
    sessions_per_week: 3
    rotation: [full_body, upper, legs]
    phases_used: [2, 3]
    notes: "Faza 2-3, tjedni 12-22. Tranzicija na full body, manje sesija."

  upper_lower:
    sessions_per_week: 4
    rotation: [upper_1, lower_1, upper_2, lower_2]
    phases_used: [4]
    notes: "Faza 4, tjedni 25-35. Svaki dio tijela 2x tjedno, razliciti odabiri."


# ============================================================
# MUSCLE GROUP COVERAGE PER SESSION TYPE
# ============================================================
# Ovo pokazuje koje misicne skupine svaki session tip pokriva,
# korisno za provjeru frekvencije i volumena.

coverage_map:
