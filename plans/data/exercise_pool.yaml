# Exercise Pool - standardizirani iz stvarnih trening logova
# Izvor: training_log_all.yaml (35 tjedana), Odabir vjezbi.md, exercise_template_muskarac_2.md
#
# Polja:
#   role: main_compound | secondary_compound | isolation
#   movement_category: horizontal_push | vertical_pull | horizontal_pull | squat_knee_dominant | hip_hinge | single_leg | chest_isolation | shoulder_isolation | biceps_isolation | triceps_isolation | quad_isolation | hamstring_isolation | calf | abs
#   primary_muscles: glavne misicne skupine koje vjezba pogadja
#   secondary_muscles: pomocne misicne skupine
#   fatigue_cost: high | medium | low
#   log_frequency: koliko puta se pojavila u 35 tjedana loga
#   log_sessions: u kojim tipovima sesija se pojavljivala
#   preferred: true ako je u tvojim preferiranim poolovima iz Odabir vjezbi.md
#   aliases: alternative nazive iz loga (za normalizaciju)
#
# Za reps_min/reps_max po vjezbi pogledaj: EXCERSISES/rep_ranges.md
#
# Body map:
#   prsa, latovi, gornja_leda, prednje_rame, srednje_rame, straznje_rame,
#   triceps, biceps, kvadovi, zadnja_loza, gluteus, listovi, trbuh, donja_leda

# ============================================================
# HORIZONTAL PUSH
# ============================================================

exercises:

  - name: Bench press
    role: main_compound
    movement_category: horizontal_push
    primary_muscles: [prsa]
    secondary_muscles: [prednje_rame, triceps]
    fatigue_cost: high
    log_frequency: 31
    log_sessions: [Push, Upper 1, Full Body]
    preferred: true
    sex: male
    aliases: []

  - name: Chest press
    role: secondary_compound
    movement_category: horizontal_push
    primary_muscles: [prsa]
    secondary_muscles: [prednje_rame, triceps]
    fatigue_cost: medium
    log_frequency: 0
    log_sessions: []
    preferred: true
    sex: male
    aliases: [Masina za prsa]

  - name: Kosi potisak bucicama
    role: main_compound
    movement_category: horizontal_push
    primary_muscles: [prsa]
    secondary_muscles: [prednje_rame, triceps]
    fatigue_cost: medium
    log_frequency: 31
    log_sessions: [Push, Upper 2]
    preferred: false
    sex: male
    aliases: [Kosi potisak s bučicama, Kosi potisak bučicama]

  - name: Kosi bench press
